<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Refugio de animales</title>
</head>


<body>
    <h1>Animales del refugio</h1>

    <div class="animal">
        <h2 class="nombre">Luna</h2>
        <p class="tipo">Perro</p>
        <p class="edad">3 años</p>
        <p class="estado">En adopción</p>
    </div>

    

    <div class="animal">
        <h2 class="nombre">Nur</h2>
        <p class="tipo">Gato</p>
        <p class="edad">2 años</p>
        <p class="estado">Disponible</p>
    </div>


    
    <div class="animal">
        <h2 class="nombre">Capitán</h2>
        <p class="tipo">Perro</p>
        <p class="edad">5 años</p>
        <p class="estado">Adoptado</p>
    </div>

</body>
</html>
